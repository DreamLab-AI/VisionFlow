<?xml version="1.0" encoding="UTF-8"?>
<svg id="diagram-05-kpi-dashboard" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 500px;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><style>#diagram-05-kpi-dashboard{font-family:sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#diagram-05-kpi-dashboard .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#diagram-05-kpi-dashboard .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#diagram-05-kpi-dashboard .error-icon{fill:#552222;}#diagram-05-kpi-dashboard .error-text{fill:#552222;stroke:#552222;}#diagram-05-kpi-dashboard .edge-thickness-normal{stroke-width:1px;}#diagram-05-kpi-dashboard .edge-thickness-thick{stroke-width:3.5px;}#diagram-05-kpi-dashboard .edge-pattern-solid{stroke-dasharray:0;}#diagram-05-kpi-dashboard .edge-thickness-invisible{stroke-width:0;fill:none;}#diagram-05-kpi-dashboard .edge-pattern-dashed{stroke-dasharray:3;}#diagram-05-kpi-dashboard .edge-pattern-dotted{stroke-dasharray:2;}#diagram-05-kpi-dashboard .marker{fill:#333333;stroke:#333333;}#diagram-05-kpi-dashboard .marker.cross{stroke:#333333;}#diagram-05-kpi-dashboard svg{font-family:sans-serif;font-size:16px;}#diagram-05-kpi-dashboard p{margin:0;}#diagram-05-kpi-dashboard .node .neo-node{stroke:#9370DB;}#diagram-05-kpi-dashboard [data-look="neo"].node rect,#diagram-05-kpi-dashboard [data-look="neo"].cluster rect,#diagram-05-kpi-dashboard [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#diagram-05-kpi-dashboard [data-look="neo"].swimlane.cluster rect{filter:none;}#diagram-05-kpi-dashboard [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#diagram-05-kpi-dashboard [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#diagram-05-kpi-dashboard [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#diagram-05-kpi-dashboard [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#diagram-05-kpi-dashboard [data-look="neo"].node circle .state-start{fill:#000000;}#diagram-05-kpi-dashboard [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#diagram-05-kpi-dashboard [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#diagram-05-kpi-dashboard :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="45" width="232" height="212" fill="#ECECFF"/><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 50) rotate(0)">HITL Precision</text></g><g class="quadrant"><rect x="31" y="45" width="232" height="212" fill="#f1f1ff"/><text x="0" y="0" fill="rgb(14, 14, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 50) rotate(0)">Augmentation Ratio</text></g><g class="quadrant"><rect x="31" y="257" width="232" height="212" fill="#f6f6ff"/><text x="0" y="0" fill="rgb(9, 9, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 262) rotate(0)">Mesh Velocity</text></g><g class="quadrant"><rect x="263" y="257" width="232" height="212" fill="#fbfbff"/><text x="0" y="0" fill="rgb(4, 4, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">Trust Variance</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(199, 199, 241); stroke-width: 1;"/><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(199, 199, 241); stroke-width: 1;"/></g><g class="data-points"><g class="data-point"><circle cx="379" cy="151" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 156) rotate(0)">HITL Precision: over 90%</text></g><g class="data-point"><circle cx="379" cy="341.79999999999995" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 346.79999999999995) rotate(0)">Trust Variance: less than 0.12 sigma</text></g><g class="data-point"><circle cx="147" cy="151" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 156) rotate(0)">Augmentation Ratio: over 65%</text></g><g class="data-point"><circle cx="147" cy="341.79999999999995" r="5" fill="hsl(240, 100%, NaN%)" stroke="hsl(240, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 346.79999999999995) rotate(0)">Mesh Velocity: less than 48h</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 479) rotate(0)">Operational Speed</text></g><g class="label"><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 479) rotate(0)">Strategic Insight</text></g><g class="label"><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 363) rotate(-90)">System Health</text></g><g class="label"><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 151) rotate(-90)">Human Effectiveness</text></g></g><g class="title"><text x="0" y="0" fill="rgb(19, 19, 0)" font-size="20" dominant-baseline="hanging" text-anchor="middle" transform="translate(250, 10) rotate(0)">KPI Dashboard — Agentic Mesh Metrics</text></g></g></svg>
