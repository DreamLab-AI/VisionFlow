Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0"
EndSection

Section "Monitor"
    Identifier     "Monitor0"
    HorizSync       30.0 - 83.0
    VertRefresh     56.0 - 76.0
    Modeline "2048x2048_60.00" 226.75  2048 2200 2416 2784  2048 2051 2061 2096 -hsync +vsync
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "modesetting"
    Option         "AccelMethod" "glamor"
    Option         "DRI" "3"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
    DefaultDepth    24
    SubSection "Display"
        Depth       24
        Modes      "2048x2048_60.00"
        Virtual    2048 2048
    EndSubSection
EndSection

Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "AllowMouseOpenFail" "true"
    Option "PciForceNone" "true"
    Option "AutoEnableDevices" "false"
    Option "AutoAddDevices" "false"
EndSection
