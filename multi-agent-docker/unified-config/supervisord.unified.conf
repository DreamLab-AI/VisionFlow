[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ============================================================================
# VNC Server (Display :1, Port 5901)
# ============================================================================

[program:xvnc]
command=/usr/bin/Xvnc :1 -geometry 1920x1080 -depth 24 -rfbport 5901 -SecurityTypes None -AlwaysShared -AcceptKeyEvents -AcceptPointerEvents -AcceptSetDesktopSize -SendCutText -AcceptCutText -extension GLX
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1",LIBGL_ALWAYS_SOFTWARE="1"
autostart=true
autorestart=true
priority=100
stdout_logfile=/var/log/xvnc.log
stderr_logfile=/var/log/xvnc.error.log

# ============================================================================
# XFCE4 Desktop Environment
# ============================================================================

[program:xfce4]
command=/usr/bin/startxfce4
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1",DBUS_SESSION_BUS_ADDRESS="unix:path=/run/user/1000/bus",XDG_RUNTIME_DIR="/run/user/1000"
autostart=true
autorestart=true
priority=200
stdout_logfile=/var/log/xfce4.log
stderr_logfile=/var/log/xfce4.error.log

# ============================================================================
# SSH Server (Port 22)
# ============================================================================

[program:sshd]
command=/usr/sbin/sshd -D -e
user=root
autostart=true
autorestart=true
priority=50
stdout_logfile=/var/log/sshd.log
stderr_logfile=/var/log/sshd.error.log

# ============================================================================
# Management API (Port 9090)
# ============================================================================

[program:management-api]
command=/usr/bin/node /opt/management-api/server.js
directory=/opt/management-api
user=devuser
environment=HOME="/home/devuser",PORT="9090",NODE_ENV="production"
autostart=true
autorestart=true
priority=300
stdout_logfile=/var/log/management-api.log
stderr_logfile=/var/log/management-api.error.log

# ============================================================================
# code-server (Port 8080)
# ============================================================================

[program:code-server]
command=/usr/bin/code-server --bind-addr 0.0.0.0:8080 --auth none /home/devuser/workspace
user=devuser
environment=HOME="/home/devuser",USER="devuser"
autostart=true
autorestart=true
priority=400
stdout_logfile=/var/log/code-server.log
stderr_logfile=/var/log/code-server.error.log

# ============================================================================
# Claude Z.AI Service (Port 9600 - Internal Only)
# Runs as zai-user for isolation
# ============================================================================

[program:claude-zai]
command=/usr/bin/node /opt/claude-zai/server.js
directory=/opt/claude-zai
user=zai-user
environment=HOME="/home/zai-user",PORT="9600",NODE_ENV="production"
autostart=true
autorestart=true
priority=500
stdout_logfile=/var/log/claude-zai.log
stderr_logfile=/var/log/claude-zai.error.log

# ============================================================================
# Gemini Flow Daemon (gemini-user)
# ============================================================================

[program:gemini-flow]
command=/home/gemini-user/.local/node_modules/.bin/gemini-flow daemon
directory=/home/gemini-user/workspace
user=gemini-user
environment=HOME="/home/gemini-user",USER="gemini-user"
autostart=true
autorestart=true
priority=600
stdout_logfile=/var/log/gemini-flow.log
stderr_logfile=/var/log/gemini-flow.error.log

# ============================================================================
# tmux Workspace Auto-Start (devuser)
# Starts after a delay to ensure other services are ready
# ============================================================================

[program:tmux-autostart]
command=/bin/bash -c "sleep 5 && /home/devuser/.config/tmux-autostart.sh"
user=devuser
environment=HOME="/home/devuser",USER="devuser",WORKSPACE="/home/devuser/workspace",AGENTS_DIR="/home/devuser/agents"
autostart=true
autorestart=false
priority=900
stdout_logfile=/var/log/tmux-autostart.log
stderr_logfile=/var/log/tmux-autostart.error.log

# ============================================================================
# DBus Daemon (required for desktop apps)
# ============================================================================

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork
user=root
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/dbus.log
stderr_logfile=/var/log/dbus.error.log

[program:dbus-user]
command=/usr/bin/dbus-daemon --session --nofork --address=unix:path=/run/user/1000/bus
user=devuser
environment=HOME="/home/devuser",USER="devuser",XDG_RUNTIME_DIR="/run/user/1000"
autostart=true
autorestart=true
priority=15
stdout_logfile=/var/log/dbus-user.log
stderr_logfile=/var/log/dbus-user.error.log
